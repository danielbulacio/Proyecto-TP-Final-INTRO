<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroMonitor - Cultivos</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <!-- Bulma CSS Framework -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <!-- CSS del navbar original -->
    <link rel="stylesheet" href="./css/navbar.css" />


    <!-- Estilos adicionales limpios para pulir la interfaz -->
    <link rel="stylesheet" href="./css/cultivos.css" />

    <!-- Iconografía Google Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,-25&icon_names=agriculture"
    />

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">



  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar is-white">
      <div class="container">
        <div class="navbar-brand">
          <a class="navbar-item" href="index.html">
          <img src="./logo.png">
          <h1 style="font-weight: 800; font-size: 24PX;">AgroMonitor</h1>
          </a>
        </div>
        <!-- LINKS DEL NAVBAR -->
        <div id="navbarExampleTransparentExample" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item" href="parcelas.html"> Parcelas </a>
            <a class="navbar-item" href="cultivos.html"> Cultivos </a>
            <a class="navbar-item" href="tareas.html"> Tareas </a>
          </div>
          <div class="navbar-end">
            <div class="navbar-item">
              <p class="control">
                <a
                  class="button is-primary"
                  href="ayuda.html"
                >
                  <span>Ayuda</span>
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </nav><!-- FIN DEL NAVBAR -->

    <!-- CONTENIDO PRINCIPAL -->
    <main class="section">
      
        <div class="container">
        <!-- Cabecera de la Sección de Cultivos -->
        <div class="crop-hero shadow-sm">
          <div class="columns is-vcentered">
            <div class="column">
              <h1 class="title is-3 has-text-white mb-2">Monitoreo de Cultivos</h1>
              <h2 class="subtitle is-6 has-text-white-ter mb-0">Base de datos de siembra y parcelación activa en tiempo real</h2>
            </div>
            <!-- Botón de redirección a la página de administración CRUD ubicado dentro de la página -->
            <div class="column is-narrow">
              <a class="button is-white is-outlined is-rounded is-medium" href="crud_cultivos.html">
                <span class="icon mr-1"><i class="material-icons">settings</i></span>
                <span>Gestionar Cultivos (CRUD)</span>
              </a>
            </div>
          </div>
        </div>
        

        <!-- Contenedor Seguro para Alertas / Mensajes de Error de Base de Datos -->
        <div id="error" class="notification is-danger is-light is-hidden mb-5"></div>

        <!-- Cuadrícula de Cultivos cargada asíncronamente -->
        <div class="columns is-multiline" id="grid-cultivos">
          <!-- Spinner de Carga -->
          <div class="column is-12 has-text-centered py-6">
            <button class="button is-loading is-white is-large">Cargando base de datos...</button>
          </div>
        </div>

      </div>
    </main>

    <!-- VINCULACIÓN DEL ARCHIVO JAVASCRIPT EXTERNO -->
    <script src="./js/cultivos.js"></script>
  </body>
</html>
