<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tareas · LOGO AGRO</title>
    <!-- Esto es para que funcione Bulma -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <!-- Para que lea el css del navbar (que es una sobreescritura de bumla) -->
    <link rel="stylesheet" href="./css/navbar.css" />
    <!-- Estilos propios de la pagina de tareas -->
    <link rel="stylesheet" href="./css/tareas.css" />

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar is-white">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item" href="index.html">
        <img src="./logo.png">
        <h1 style="font-weight: 800; font-size: 24PX;">AgroMonitor</h1>
        </a>
      </div>
      <!-- LINKS DEL NAVBAR -->
      <div id="navbarExampleTransparentExample" class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item" href="parcelas.html"> Parcelas </a>
          <a class="navbar-item" href="cultivos.html"> Cultivos </a>
          <a class="navbar-item" href="tareas.html"> Tareas </a>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <p class="control">
              <a
                class="button is-primary"
                href="ayuda.html"
              >
                <span>Ayuda</span>
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </nav><!-- FIN DEL NAVBAR -->
    
    <!-- ENCABEZADO DE LA SECCION -->
    <section class="section">
      <div class="container">
        <div class="crop-hero shadow-sm">
          <div class="columns is-vcentered">
            <div class="column">
              <h1 class="title is-3 has-text-white">Gestor de Tareas</h1>
              <h2 class="subtitle is-6 has-text-white-ter ">Registro de tareas y su nivel de importancia</h2>
            </div>
            <div class="column is-narrow">
              <button id="btn-nueva-tarea" class="boton-blanco button">
                <span class="icon"><strong>+</strong></span>
                <span>Nueva tarea</span>
              </button>
            </div>
          </div>
        </div>

        <!-- FILTROS -->
        <div class="field is-grouped is-grouped-multiline">
          <div class="control">
            <div class="select">
              <select id="filtro-estado">
                <option value="">Todos los estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="en_progreso">En progreso</option>
                <option value="completada">Completada</option>
                <option value="cancelada">Cancelada</option>
              </select>
            </div>
          </div>
          <div class="control">
            <div class="select">
              <select id="filtro-prioridad">
                <option value="">Toda importancia</option>
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Urgente">Urgente</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- NOTIFICACION GLOBAL (exito / error) -->
    <div class="container">
      <div id="notificacion-global" class="notification is-hidden mx-5"></div>
    </div>

    <!-- LISTADO DE TAREAS -->
    <section class="section pt-3">
      <div class="container">
        <div id="lista-tareas" class="columns is-multiline">
          <div class="column is-full">
            <p class="has-text-grey has-text-centered">Cargando tareas…</p>
          </div>
        </div>
      </div>
    </section>

    <!-- MODAL: CREAR / EDITAR TAREA -->
    <div id="modal-tarea" class="modal">
      <div class="modal-background" data-cerrar="modal-tarea"></div>
      <div class="modal-card">
        <header class="modal-card-head">
          <p class="modal-card-title" id="modal-tarea-titulo">Nueva tarea</p>
          <button class="delete" aria-label="close" data-cerrar="modal-tarea"></button>
        </header>
        <section class="modal-card-body">
          <form id="form-tarea">
            <input type="hidden" id="tarea-id" />

            <div class="field">
              <label class="label" for="input-parcela">Parcela</label>
              <div class="control">
                <div class="select is-fullwidth">
                  <select id="input-parcela" required></select>
                </div>
              </div>
            </div>

            <div class="field">
              <label class="label" for="input-tarea">Descripción de la tarea</label>
              <div class="control">
                <textarea
                  id="input-tarea"
                  class="textarea"
                  maxlength="255"
                  required
                  placeholder="Ej: Revisar sistema de riego por goteo"
                ></textarea>
              </div>
            </div>

            <div class="field">
              <label class="label">Importancia</label>
              <div class="control">
                <div class="selector-prioridad" id="selector-prioridad">
                  <div class="opcion-prioridad" data-valor="Baja">Baja</div>
                  <div class="opcion-prioridad" data-valor="Media">Media</div>
                  <div class="opcion-prioridad" data-valor="Alta">Alta</div>
                  <div class="opcion-prioridad" data-valor="Urgente">Urgente</div>
                </div>
                <input type="hidden" id="input-prioridad" value="Media" />
              </div>
            </div>

            <div class="field">
              <label class="label" for="input-fecha-limite">Fecha límite (opcional)</label>
              <div class="control">
                <input type="date" id="input-fecha-limite" class="input" />
              </div>
            </div>

            <div id="errores-form-tarea" class="notification is-danger is-light is-hidden"></div>
          </form>
        </section>
        <footer class="modal-card-foot">
          <button class="button is-primary" id="guardar-tarea">Guardar tarea</button>
          <button class="button" data-cerrar="modal-tarea">Cancelar</button>
        </footer>
      </div>
    </div>

    <!-- MODAL: REASIGNAR A OTRA PARCELA -->
    <div id="reasignar" class="modal">
      <div class="modal-background" data-cerrar="reasignar"></div>
      <div class="modal-card">
        <header class="modal-card-head">
          <p class="modal-card-title">Reasignar tarea a otra parcela</p>
          <button class="delete" aria-label="close" data-cerrar="reasignar"></button>
        </header>
        <section class="modal-card-body">
          <input type="hidden" id="reasignar-tarea-id" />
          <div class="field">
            <label class="label" for="input-nueva-parcela">Nueva parcela</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="input-nueva-parcela"></select>
              </div>
            </div>
          </div>
          <div id="errores-reasignar" class="notification is-danger is-light is-hidden"></div>
        </section>
        <footer class="modal-card-foot">
          <button class="button is-primary" id="confirmar-reasignar">Reasignar</button>
          <button class="button" data-cerrar="reasignar">Cancelar</button>
        </footer>
      </div>
    </div>

    <!-- MODAL: CONFIRMAR ELIMINACION -->
    <div id="modal-confirmar-eliminar" class="modal">
      <div class="modal-background" data-cerrar="modal-confirmar-eliminar"></div>
      <div class="modal-card">
        <header class="modal-card-head">
          <p class="modal-card-title">Eliminar tarea</p>
          <button class="delete" aria-label="close" data-cerrar="modal-confirmar-eliminar"></button>
        </header>
        <section class="modal-card-body">
          <p>Esta acción no se puede deshacer. ¿Confirmás que querés eliminar esta tarea?</p>
          <input type="hidden" id="eliminar-tarea-id" />
        </section>
        <footer class="modal-card-foot">
          <button class="button is-danger" id="confirmar-eliminar">Sí, eliminar</button>
          <button class="button" data-cerrar="modal-confirmar-eliminar">Cancelar</button>
        </footer>
      </div>
    </div>

    <script src="./js/tareas.js"></script>
  </body>
</html>
