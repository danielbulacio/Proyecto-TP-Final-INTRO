    SEGUIR ACA
    -->

<section class="section">
  <!-- El contenedor principal -->
  <div class="container">
    
    <!-- Fila centrada -->
    <div class="columns is-centered">
      
      <!-- Columna que controla el ancho del formulario (ocupará la mitad en PC y un poco más en tablets) -->
      <div class="column is-half-desktop is-8-tablet">
        
        <!-- Opcional: la clase "box" le da un fondo blanco con una sombra sutil muy elegante -->
        <div class="box" style="margin-top: 4rem; background: linear-gradient(135deg, #a54910, #612807) ">
          <h1 class="title has-text-white">Crear Nueva Parcela</h1>
          
          <!-- Formulario -->
          <form id="form-agregar-parcela" class="form">
            <div class="field">
                <label class="label ">Nombre de la Parcela</label>
                <div class="control">
                    <input class="input" type="text" id="input-nombre" required>
                </div>
            </div>
            <div class="field">
             <label class="label">Latitud</label>
                <div class="control">
                    <input class="input" type="text" id="input-latitud" required>
                </div>
            </div>
            <div class="field">
                <label class="label">Longitud</label>
                <div class="control">
                    <input class="input" type="text" id="input-longitud" required>
                </div>
            </div> 
            <div class="field">
                <label class="label">Hectáreas</label>
                <div class="control">
                    <input class="input" type="text" id="input-hectareas" required>
                </div>
            </div>
            <div class="field">
              <label class="label has-text-white">Imagen (Opcional para actualizar)</label>
              <div class="control">
                <!-- Contenedor blanco idéntico a los otros inputs -->
                <div class="custom-file-box">
                  <label for="input-imagen" class="custom-file-btn">
                    Elegir archivo 📁
                  </label>
                  <span id="nombre-archivo" class="custom-file-text">Sin archivo seleccionado</span>
                  <input type="file" id="input-imagen" accept="image/*" class="is-hidden-input" />
                </div>
              </div>
            </div>


        
                <p class="help is-danger" id="mensaje-error"></p>
                <div class="control">
                    <button type="submit" class="button is-top">Guardar Parcela</button>
                    <!-- Botón para cancelar y volver atrás -->
                    <a href="parcelas.html" class="button is-light" style="border: solid white !important; box-shadow: none !important;">Cancelar</a> 
                </div>
         </form>

        </div>
      </div>
    </div>
  </div>
</section>
    <script src="./js/create_parcela.js"></script>
  </body>
</html>
