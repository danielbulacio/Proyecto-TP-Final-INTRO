<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroMonitor - Parcelas</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <!-- Esto es para que funcione Bulma -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <!-- Para que lea el css del navbar (que es una sobreescritura de bumla) -->
    <link rel="stylesheet" href="./css/navbar.css" />
    <link rel="stylesheet" href="./css/parcela.css">
    <link rel="stylesheet" href="./css/var-globales.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,-25&icon_names=agriculture"
    />

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  </head>
  <body>
  <!-- NAVBAR -->
  <nav class="navbar is-white">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item" href="index.html">
        <img src="./logo.png">
        <h1 style="font-weight: 800; font-size: 24PX;">AgroMonitor</h1>
        </a>
      </div>
      <!-- LINKS DEL NAVBAR -->
      <div id="navbarExampleTransparentExample" class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item" href="parcelas.html"> Parcelas </a>
          <a class="navbar-item" href="cultivos.html"> Cultivos </a>
          <a class="navbar-item" href="tareas.html"> Tareas </a>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <p class="control">
              <a
                class="button is-primary"
                href="ayuda.html"
              >
                <span>Ayuda</span>
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </nav><!-- FIN DEL NAVBAR -->

  <main class="section">
    <div class="container">
      <div class="crop-hero shadow-sm">
          <div class="columns is-vcentered">
            <div class="column">
              <h1 class="title is-3 has-text-white mb-2">Monitoreo de Parcelas</h1>
              <h2 class="subtitle is-6 has-text-white-ter mb-0">Parcelas activas actualmente</h2>
            </div>
            <!-- Botón de redirección a la página de administración CRUD ubicado dentro de la página -->
            <div class="column is-narrow">
              <div class="is-flex is-justify-content-space-between is-align-items-center mb-5">
                  <button id="btn-agregar-parcela" class="boton-blanco button">
                    <span class="icon"><strong>+</strong></span>
                    <span>Agregar Parcela</span>
                  </button>
                  
              </div>
            </div>
          </div>
      </div>


   
  
    <div id="error" class="has-text-danger mb-4"></div>

    <!-- GRILLA DE COLUMNAS (Acá es donde JS va a meter las tarjetas luego) -->
    <div id="tarjetas-parcelas" class="columns is-multiline">

      <!-- ENVOLTORIO DE LA TARJETA: Controla el tamaño (is-4 significa que entran 3 por fila) -->
      <div  class="column is-12-mobile is-6-tablet is-4-desktop">
        
        <!-- TU TARJETA -->
        <div class="card">
          <div class="card-image">
            <figure class="image is-4by3">
              <img
                src="https://bulma.io/assets/images/placeholders/1280x960.png"
                alt="Placeholder image"
                style="object-fit: cover;" 
              />
            </figure>
          </div>
          
          <div class="card-content">
            <p class="title is-4 mb-3">.</p>

            <div class="content">
              <p class="has-text-grey">
              </p>
              
              <!-- Agrupamos tus botones para que se acomoden bien si la pantalla es chica -->
              <div class="buttons mt-4">
                <button class="button is-info is-small">Ver Detalle</button>
                <button class="button is-success is-small">Agregar Tarea</button>
              </div>
            </div>
          </div>
        </div> <!-- FIN DE TU TARJETA -->

      </div> <!-- FIN DEL ENVOLTORIO -->

    </div> <!-- FIN DE LA GRILLA -->

  </div> <!-- FIN DEL CONTAINER -->
</main>
    <dialog id="modal-confirmacion" class="modal-personalizado">
          <p id="texto-confirmacion">¿Estás seguro?</p>
      <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
          <button id="btn-cancelar-modal" class="button is-light">Cancelar</button>
          <button id="btn-aceptar-modal" class="button is-danger">Eliminar</button>
      </div>
    </dialog>
    <script src="js/parcela.js"></script>
  </body>
</html>
